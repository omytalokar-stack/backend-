<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <radialGradient id="goldGradient" cx="40%" cy="40%">
      <stop offset="0%" style="stop-color:#FFE55C;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B7500;stop-opacity:1" />
    </radialGradient>
    <filter id="goldShadow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" />
    </filter>
  </defs>
  
  <!-- Black background -->
  <rect width="512" height="512" fill="#000000"/>
  
  <!-- Metallic silver gear/badge ring -->
  <g id="gear-ring">
    <circle cx="256" cy="180" r="170" fill="none" stroke="#C0C0C0" stroke-width="20" opacity="0.6"/>
    <!-- Gear teeth -->
    <g stroke="#A9A9A9" stroke-width="12" fill="none" opacity="0.7">
      <line x1="256" y1="10" x2="256" y2="40"/>
      <line x1="256" y1="472" x2="256" y2="502"/>
      <line x1="10" y1="256" x2="40" y2="256"/>
      <line x1="472" y1="256" x2="502" y2="256"/>
      <line x1="60" y1="60" x2="85" y2="85"/>
      <line x1="427" y1="427" x2="452" y2="452"/>
      <line x1="452" y1="60" x2="427" y2="85"/>
      <line x1="85" y1="427" x2="60" y2="452"/>
    </g>
  </g>
  
  <!-- Main golden P letter -->
  <g id="main-p">
    <text x="256" y="320" font-family="Georgia, serif" font-size="280" font-weight="bold" text-anchor="middle" fill="url(#goldGradient)" filter="url(#goldShadow)" letter-spacing="-10">P</text>
  </g>
  
  <!-- First heart with flower -->
  <g id="heart-flower-1" transform="translate(150, 120)">
    <!-- Flower stem -->
    <line x1="0" y1="40" x2="0" y2="0" stroke="#2d5016" stroke-width="2"/>
    <!-- Flower petals (blue) -->
    <circle cx="-8" cy="-8" r="6" fill="#4A90E2"/>
    <circle cx="8" cy="-8" r="6" fill="#4A90E2"/>
    <circle cx="0" cy="-15" r="6" fill="#4A90E2"/>
    <circle cx="-8" cy="0" r="6" fill="#4A90E2"/>
    <circle cx="8" cy="0" r="6" fill="#4A90E2"/>
    <!-- Flower center -->
    <circle cx="0" cy="-6" r="4" fill="#FFD700"/>
    <!-- Leaves -->
    <ellipse cx="-12" cy="15" rx="5" ry="8" fill="#228B22" transform="rotate(-30 -12 15)"/>
    <ellipse cx="12" cy="15" rx="5" ry="8" fill="#7CB342" transform="rotate(30 12 15)"/>
    <!-- Heart shape -->
    <path d="M 0 25 Q -15 15 -15 5 Q -15 -5 0 -2 Q 15 -5 15 5 Q 15 15 0 25" fill="#DC143C" opacity="0.9"/>
  </g>
  
  <!-- Second heart lower -->
  <g id="heart-flower-2" transform="translate(180, 320)">
    <!-- Heart shape -->
    <path d="M 0 20 Q -12 12 -12 4 Q -12 -4 0 -2 Q 12 -4 12 4 Q 12 12 0 20" fill="#C41E3A" opacity="0.95"/>
  </g>
  
  <!-- Ornate bottom swirl (silver/gray metallic) -->
  <g id="bottom-swirl" transform="translate(280, 380)">
    <path d="M -30 0 Q -40 20 -20 40 Q 0 50 20 40 Q 40 20 30 0" fill="none" stroke="#696969" stroke-width="14" stroke-linecap="round" opacity="0.7"/>
    <path d="M -20 10 Q -30 25 -15 35 Q 0 40 15 35 Q 30 25 20 10" fill="none" stroke="#808080" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  </g>
</svg>